apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      enableServiceLinks: false
      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          command: ["n8n", "worker"]
          env:
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_ENCRYPTION_KEY
              value: "AdubH1SdjCOQerXr"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "false"
            - name: N8N_MODE
              value: "queue"
            - name: N8N_TASKS_EVALUATOR_MODE
              value: "external"
            - name: QUEUE_BULL_REDIS_HOST
              value: "redis"
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: DB_TYPE
              value: "postgresdb"
            - name: DB_POSTGRESDB_DATABASE
              value: "n8n"
            - name: DB_POSTGRESDB_HOST
              value: "postgres"
            - name: DB_POSTGRESDB_USER
              value: "admin"
            - name: DB_POSTGRESDB_PASSWORD
              value: "v6nmjHaYGaIi2FVo"